<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>SquadPlay</title>

    <!-- Mobile-first viewport — no zoom, fills screen like a native app -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />

    <!-- PWA / home screen -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="SquadPlay" />
    <meta name="application-name" content="SquadPlay" />

    <!-- Theme colours -->
    <meta name="theme-color" content="#0A1628" />
    <meta name="msapplication-navbutton-color" content="#0A1628" />

    <!-- SEO / social -->
    <meta name="description" content="Organise your casual sports group — matches, payments, ratings." />
    <meta property="og:title" content="SquadPlay" />
    <meta property="og:description" content="End the group chat chaos. Organise matches, track RSVPs, settle payments." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://squadplay.app" />

    <!-- Icons -->
    <link rel="icon" type="image/png" href="/assets/images/favicon.png" />
    <link rel="apple-touch-icon" href="/assets/images/icon.png" />

    <style>
      /* Prevent scroll bounce / overscroll on iOS Safari */
      html, body {
        height: 100%;
        overflow: hidden;
        overscroll-behavior: none;
        -webkit-overflow-scrolling: touch;
        background-color: #F7F9FB;
      }
      #root {
        height: 100%;
        display: flex;
        flex-direction: column;
      }
      /* Hide scrollbars globally — feels native */
      * {
        scrollbar-width: none;
        -ms-overflow-style: none;
      }
      *::-webkit-scrollbar {
        display: none;
      }
    </style>
  </head>
  <body>
    <!-- Expo injects the app bundle here -->
  </body>
</html>
